<!DOCTYPE html>
<html>

<head>
    <title>Advanced E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h1>ShopZone</h1>
    <div id="cart">Cart: 0</div>
</nav>

<header>
    <h1>Welcome to ShopZone</h1>
    <p>Best Deals Online</p>
</header>

<section class="products">

    <div class="card">
        <h3>Phone</h3>
        <p>₹20,000</p>
        <button onclick="addToCart()">Add</button>
    </div>

    <div class="card">
        <h3>Laptop</h3>
        <p>₹50,000</p>
        <button onclick="addToCart()">Add</button>
    </div>

    <div class="card">
        <h3>Watch</h3>
        <p>₹5,000</p>
        <button onclick="addToCart()">Add</button>
    </div>

</section>

<script src="script.js"></script>
</body>

</html>
